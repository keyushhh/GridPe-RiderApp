<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
  <script>
    window.addEventListener('error', function(e) {
      var errDiv = document.createElement('div');
      errDiv.style.cssText = 'position: absolute; top: 0; left: 0; right: 0; background: red; color: white; padding: 20px; z-index: 999999; word-wrap: break-word; font-family: monospace; font-size: 14px; max-height: 100%; overflow-y: auto;';
      errDiv.innerHTML = '<b>JS Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno;
      if (document.body) document.body.appendChild(errDiv);
      else window.addEventListener('DOMContentLoaded', function() { document.body.appendChild(errDiv); });
    });
    window.addEventListener('unhandledrejection', function(e) {
      var errDiv = document.createElement('div');
      errDiv.style.cssText = 'position: absolute; top: 50%; left: 0; right: 0; background: red; color: white; padding: 20px; z-index: 999999; word-wrap: break-word; font-family: monospace; font-size: 14px; max-height: 100%; overflow-y: auto;';
      errDiv.innerHTML = '<b>Unhandled Promise:</b> ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
      if (document.body) document.body.appendChild(errDiv);
      else window.addEventListener('DOMContentLoaded', function() { document.body.appendChild(errDiv); });
    });
  </script>
  <title>GridPe Rider</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

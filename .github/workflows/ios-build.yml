name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build IPA
    runs-on: macos-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout & Setup
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ──────────────────────────────────────────────
      # 2. Install npm dependencies
      # ──────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Fix node_modules bin permissions
        run: chmod -R +x node_modules/.bin || true

      # ──────────────────────────────────────────────
      # 3. Create .env from GitHub Secrets
      # ──────────────────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_MAPS_API_KEY=${{ secrets.VITE_MAPS_API_KEY }}
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY=${{ secrets.VITE_SUPABASE_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RAZORPAY_KEY_ID=${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_CORBADO_PROJECT_ID=${{ secrets.VITE_CORBADO_PROJECT_ID }}
          VITE_CORBADO_API_SECRET=${{ secrets.VITE_CORBADO_API_SECRET }}
          ENVEOF

      # ──────────────────────────────────────────────
      # 4. Build web app (production)
      #    Skip tsc type-check, run vite build directly
      # ──────────────────────────────────────────────
      - name: Build web app (production)
        run: npx vite build

      - name: Verify dist output
        run: |
          echo "--- dist contents ---"
          ls -la dist/
          echo "--- checking index.html ---"
          head -20 dist/index.html

      # ──────────────────────────────────────────────
      # 5. Sync Capacitor iOS
      #    cap add creates ios/ from scratch (SPM-based, no CocoaPods)
      #    cap sync copies dist/ into the native project
      # ──────────────────────────────────────────────
      - name: Sync Capacitor iOS
        run: |
          npx cap add ios
          npx cap sync ios

      # ──────────────────────────────────────────────
      # 6. Patch capacitor.config.json
      #    - Remove any "server" key (prevents dev-server connection)
      #    - Enable webContentsDebuggingEnabled for Safari inspector
      # ──────────────────────────────────────────────
      - name: Ensure no dev-server URL in Capacitor config
        run: |
          python3 -c '
          import json
          path = "ios/App/App/capacitor.config.json"
          with open(path, "r") as f:
              data = json.load(f)
          data.pop("server", None)
          if "ios" not in data:
              data["ios"] = {}
          data["ios"]["webContentsDebuggingEnabled"] = True
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          print("Patched capacitor.config.json:")
          print(json.dumps(data, indent=2))
          '

      # ──────────────────────────────────────────────
      # 7. Patch Info.plist
      #    - Add CAPACITOR_DEBUG = false (key doesn't exist by default, use -insert)
      #    - Set CFBundleDisplayName
      # ──────────────────────────────────────────────
      - name: Set app display name & disable debug mode
        run: |
          PLIST="ios/App/App/Info.plist"
          # CAPACITOR_DEBUG doesn't exist in the default plist, so insert it
          plutil -insert CAPACITOR_DEBUG -string "false" "$PLIST" 2>/dev/null || \
            plutil -replace CAPACITOR_DEBUG -string "false" "$PLIST"
          plutil -replace CFBundleDisplayName -string "Grid.Pe Rider App" "$PLIST"
          echo "--- Info.plist patched ---"
          plutil -p "$PLIST"

      # ──────────────────────────────────────────────
      # 8. Verify web assets were copied into iOS bundle
      # ──────────────────────────────────────────────
      - name: Verify iOS web assets
        run: |
          echo "--- ios/App/App/public contents ---"
          ls -la ios/App/App/public/ || echo "public dir missing!"
          echo "--- checking for index.html ---"
          cat ios/App/App/public/index.html | head -20 || echo "index.html missing!"

      # ──────────────────────────────────────────────
      # 9. Resolve SPM dependencies first
      #    Capacitor 6+ uses SPM (no Podfile, no .xcworkspace)
      #    Must use -project App.xcodeproj (NOT -workspace)
      # ──────────────────────────────────────────────
      - name: Resolve Swift Package Manager dependencies
        working-directory: ios/App
        run: |
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      # ──────────────────────────────────────────────
      # 10. Build Xcode project (Release, unsigned)
      # ──────────────────────────────────────────────
      - name: Build Xcode project (Release)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SYMROOT=$(pwd)/build

      # ──────────────────────────────────────────────
      # 11. Verify .app bundle before packaging
      # ──────────────────────────────────────────────
      - name: Verify .app bundle contents
        working-directory: ios/App
        run: |
          echo "--- Build output ---"
          ls -la build/Release-iphoneos/
          echo "--- App bundle contents ---"
          ls -la build/Release-iphoneos/App.app/ | head -20
          echo "--- Check for index.html inside bundle ---"
          find build/Release-iphoneos/App.app -name "index.html" || echo "WARNING: index.html not found in .app bundle!"

      # ──────────────────────────────────────────────
      # 12. Package IPA
      # ──────────────────────────────────────────────
      - name: Package IPA
        working-directory: ios/App
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/App.app Payload/
          zip -qr GridPeRider.ipa Payload
          echo "IPA size: $(du -h GridPeRider.ipa | cut -f1)"

      # ──────────────────────────────────────────────
      # 13. Upload
      # ──────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridPeRider-IPA
          path: ios/App/GridPeRider.ipa
          retention-days: 7

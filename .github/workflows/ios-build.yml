name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Ensure iOS Platform and Sync
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Patch capacitor.config.json
        run: |
          python3 -c '
          import json, os
          path = "ios/App/App/capacitor.config.json"
          if os.path.exists(path):
              with open(path, "r") as f: data = json.load(f)
              if "server" in data: del data["server"]
              if "ios" not in data: data["ios"] = {}
              data["ios"]["webContentsDebuggingEnabled"] = True
              with open(path, "w") as f: json.dump(data, f, indent=2)
          else:
              print("capacitor.config.json not found")
          '

      - name: Patch Info.plist
        run: |
          plutil -replace CAPACITOR_DEBUG -string "false" ios/App/App/Info.plist
          plutil -replace CFBundleDisplayName -string "Grid.Pe Rider App" ios/App/App/Info.plist

      - name: Resolve SPM Dependencies
        working-directory: ios/App
        run: xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App

      - name: Build iOS App (Release)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SYMROOT=$(PWD)/build

      - name: Package Payload to IPA
        working-directory: ios/App
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/App.app Payload/
          zip -qr GridPeRider.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridPeRider-IPA
          path: ios/App/GridPeRider.ipa
          retention-days: 7
